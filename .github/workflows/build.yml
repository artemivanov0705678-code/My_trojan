name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install Buildozer
      run: |
        pip install buildozer
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
    - name: Build APK
      run: |
        buildozer init
        sed -i 's/^requirements.*/requirements = python3/' buildozer.spec
        sed -i 's/^#android.permissions.*/android.permissions = INTERNET, CAMERA, RECORD_AUDIO, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE/' buildozer.spec
        sed -i 's/^package.name.*/package.name = MyRAT/' buildozer.spec
        sed -i 's/^package.domain.*/package.domain = org.test/' buildozer.spec
        buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: MyRAT
        path: bin/*.apk
